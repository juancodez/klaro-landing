<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="assets/Klaro-Logo-Favicon-orange.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — Klaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { orange: '#a43700', cream: '#fff8f1', muted: '#594139', soft: '#e0bfb4' },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-up .3s ease-out both; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #f4ede5 inset !important; -webkit-text-fill-color: #1e1b17 !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:#f4ede5">

  <div class="w-full max-w-sm fade-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center mb-4">
        <img src="/assets/Klaro-Logo-orange.svg" alt="Klaro" style="height:44px;width:auto" />
      </div>
      <h1 class="text-xl font-bold" style="color:#1e1b17">Elige una nueva contraseña</h1>
      <p class="text-sm mt-1" style="color:#594139">Mínimo 8 caracteres</p>
    </div>

    <!-- Loading state (default while Supabase exchanges recovery token) -->
    <div id="loading-card" class="rounded-2xl p-8 text-center shadow-sm" style="background:#fff8f1;border:1px solid rgba(164,55,0,0.1)">
      <div class="w-8 h-8 mx-auto mb-4 animate-spin rounded-full" style="border:2px solid rgba(164,55,0,0.2);border-top-color:#a43700"></div>
      <p class="text-sm" style="color:#594139">Verificando enlace…</p>
    </div>

    <!-- Success state -->
    <div id="success-card" class="hidden rounded-2xl p-6 text-center shadow-sm" style="background:#fff8f1;border:1px solid rgba(164,55,0,0.1)">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(164,55,0,0.08)">
        <svg class="w-7 h-7" style="color:#a43700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-base font-bold mb-2" style="color:#1e1b17">¡Contraseña actualizada!</h2>
      <p class="text-sm" style="color:#594139">Ya puedes iniciar sesión con tu nueva contraseña.</p>
      <a href="login.html" class="inline-block mt-5 py-3 px-6 rounded-xl text-sm font-bold text-white" style="background:#a43700">
        Ir a iniciar sesión →
      </a>
    </div>

    <!-- Expired state -->
    <div id="expired-card" class="hidden rounded-2xl p-6 text-center shadow-sm" style="background:#fff8f1;border:1px solid rgba(164,55,0,0.1)">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(220,38,38,0.08)">
        <svg class="w-7 h-7" style="color:#dc2626" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2 class="text-base font-bold mb-2" style="color:#1e1b17">Enlace caducado</h2>
      <p class="text-sm" style="color:#594139">Este enlace ya no es válido. Solicita uno nuevo.</p>
      <a href="reset.html" class="inline-block mt-5 py-3 px-6 rounded-xl text-sm font-bold text-white" style="background:#a43700">
        Solicitar nuevo enlace
      </a>
    </div>

    <!-- Form card -->
    <div id="form-card" class="hidden rounded-2xl p-6 shadow-sm" style="background:#fff8f1;border:1px solid rgba(164,55,0,0.1)">

      <div id="error-banner" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-medium" style="background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.15)"></div>

      <form id="pw-form" onsubmit="handleUpdate(event)" class="space-y-4">

        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#594139">Nueva contraseña</label>
          <input
            id="password"
            type="password"
            required
            minlength="8"
            placeholder="Mínimo 8 caracteres"
            class="w-full rounded-xl px-4 py-3 text-sm outline-none transition-all"
            style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17"
            onfocus="this.style.borderColor='#a43700'"
            onblur="this.style.borderColor='rgba(164,55,0,0.18)'"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#594139">Confirmar contraseña</label>
          <input
            id="password2"
            type="password"
            required
            placeholder="Repite la contraseña"
            class="w-full rounded-xl px-4 py-3 text-sm outline-none transition-all"
            style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17"
            onfocus="this.style.borderColor='#a43700'"
            onblur="this.style.borderColor='rgba(164,55,0,0.18)'"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full py-3 rounded-xl text-sm font-bold text-white transition-all active:scale-95 flex items-center justify-center gap-2"
          style="background:#a43700"
        >
          <span id="btn-text">Guardar contraseña</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

      </form>
    </div>

  </div>

  <script>
    const SUPABASE_URL      = 'https://rhyobhcgvrqobouqymqr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeW9iaGNndnJxb2JvdXF5bXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY0MDQsImV4cCI6MjA5MTk0MjQwNH0.Yc7wiTJ8_66uzqusGTU4dEele5B4C6ZCMlYNMf3w_3U';
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let _recoverySession = null;

    function showForm() {
      document.getElementById('loading-card').classList.add('hidden');
      document.getElementById('form-card').classList.remove('hidden');
      document.getElementById('expired-card').classList.add('hidden');
    }

    function showExpired() {
      document.getElementById('loading-card').classList.add('hidden');
      document.getElementById('form-card').classList.add('hidden');
      document.getElementById('expired-card').classList.remove('hidden');
    }

    // Check whether the URL contains recovery parameters (PKCE ?code= or implicit #type=recovery)
    function hasRecoveryParams() {
      const qp = new URLSearchParams(window.location.search);
      const hp = new URLSearchParams(window.location.hash.slice(1));
      return qp.has('code') || qp.has('token_hash') || hp.get('type') === 'recovery';
    }

    _sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        _recoverySession = session;
        showForm();
      } else if (event === 'INITIAL_SESSION' && !session) {
        // PKCE: INITIAL_SESSION fires before PASSWORD_RECOVERY while code is being exchanged.
        // Only show expired if there are no recovery params in the URL.
        if (!hasRecoveryParams()) {
          showExpired();
        }
        // else: PASSWORD_RECOVERY will fire next — stay on loading state
      }
    });

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function setLoading(on) {
      document.getElementById('btn-text').textContent = on ? 'Guardando…' : 'Guardar contraseña';
      document.getElementById('btn-spinner').classList.toggle('hidden', !on);
      document.getElementById('submit-btn').disabled = on;
    }

    async function handleUpdate(e) {
      e.preventDefault();
      document.getElementById('error-banner').classList.add('hidden');

      const pass1 = document.getElementById('password').value;
      const pass2 = document.getElementById('password2').value;

      if (pass1 !== pass2) { showError('Las contraseñas no coinciden.'); return; }
      if (pass1.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return; }

      setLoading(true);
      const { error } = await _sb.auth.updateUser({ password: pass1 });
      setLoading(false);

      if (error) {
        showError(error.message);
      } else {
        await _sb.auth.signOut();
        document.getElementById('form-card').classList.add('hidden');
        document.getElementById('success-card').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
