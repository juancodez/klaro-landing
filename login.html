<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="assets/Klaro-Logo-Favicon-orange.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Klaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#a43700',
            cream:  '#fff8f1',
            muted:  '#594139',
            soft:   '#e0bfb4',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-up .3s ease-out both; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #f4ede5 inset !important; -webkit-text-fill-color: #1e1b17 !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:#f4ede5">

  <div class="w-full max-w-sm fade-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center mb-4">
        <img src="/assets/Klaro-Logo-orange.svg" alt="Klaro" style="height:44px;width:auto" />
      </div>
      <h1 class="text-xl font-bold" style="color:#1e1b17">Bienvenido de vuelta</h1>
      <p class="text-sm mt-1" style="color:#594139">Inicia sesión en tu cuenta</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-6 shadow-sm" style="background:#fff8f1;border:1px solid rgba(164,55,0,0.1)">

      <!-- Error banner -->
      <div id="error-banner" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-medium" style="background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.15)"></div>

      <!-- Google OAuth — requires Google provider enabled in Supabase Dashboard → Auth → Providers -->
      <button type="button" onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 py-3 rounded-xl text-sm font-semibold transition-all active:scale-95 mb-4" style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 h-px" style="background:rgba(164,55,0,0.12)"></div>
        <span class="text-xs font-medium" style="color:rgba(89,65,57,.5)">o con email</span>
        <div class="flex-1 h-px" style="background:rgba(164,55,0,0.12)"></div>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">

        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#594139">Email</label>
          <input
            id="email"
            type="email"
            required
            placeholder="tu@email.com"
            class="w-full rounded-xl px-4 py-3 text-sm outline-none transition-all"
            style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17"
            onfocus="this.style.borderColor='#a43700'"
            onblur="this.style.borderColor='rgba(164,55,0,0.18)'"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#594139">Contraseña</label>
          <input
            id="password"
            type="password"
            required
            placeholder="••••••••"
            class="w-full rounded-xl px-4 py-3 text-sm outline-none transition-all"
            style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17"
            onfocus="this.style.borderColor='#a43700'"
            onblur="this.style.borderColor='rgba(164,55,0,0.18)'"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full py-3 rounded-xl text-sm font-bold text-white transition-all active:scale-95 flex items-center justify-center gap-2"
          style="background:#a43700"
        >
          <span id="btn-text">Iniciar sesión</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

      </form>
    </div>

    <!-- Forgot password -->
    <p class="text-center text-sm mt-4" style="color:#594139">
      <a href="reset.html" style="color:#a43700;font-weight:600;">¿Te olvidaste la contraseña?</a>
    </p>

    <!-- Switch to signup -->
    <p class="text-center text-sm mt-2" style="color:#594139">
      ¿No tienes cuenta?
      <a href="signup.html" class="font-bold ml-1" style="color:#a43700">Regístrate gratis</a>
    </p>

  </div>

  <script>
    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function setLoading(on) {
      document.getElementById('btn-text').textContent = on ? 'Entrando…' : 'Iniciar sesión';
      document.getElementById('btn-spinner').classList.toggle('hidden', !on);
      document.getElementById('submit-btn').disabled = on;
    }

    async function signInWithGoogle() {
      const { error } = await _sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/klaro-dashboard.html' },
      });
      if (error) showError('No se pudo conectar con Google. Intenta de nuevo.');
    }

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('error-banner').classList.add('hidden');
      setLoading(true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await _sb.auth.signInWithPassword({ email, password });

      if (error) {
        setLoading(false);
        const msgs = {
          'Invalid login credentials': 'Email o contraseña incorrectos.',
          'Email not confirmed':        'Confirma tu email antes de entrar.',
        };
        showError(msgs[error.message] || error.message);
      } else {
        window.location.replace('klaro-dashboard.html');
      }
    }
  </script>
</body>
</html>
