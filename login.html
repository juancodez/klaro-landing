<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="assets/Klaro-Logo-Favicon-orange.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Klaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#a43700',
            cream:  '#fff8f1',
            muted:  '#594139',
            soft:   '#e0bfb4',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-up .3s ease-out both; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #f4ede5 inset !important; -webkit-text-fill-color: #1e1b17 !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background:#f4ede5">

  <div class="w-full max-w-sm fade-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center mb-4">
        <img src="/assets/Klaro-Logo-orange.svg" alt="Klaro" style="height:44px;width:auto" />
      </div>
      <h1 class="text-xl font-bold" style="color:#1e1b17">Bienvenido de vuelta</h1>
      <p class="text-sm mt-1" style="color:#594139">Inicia sesión en tu cuenta</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-6 shadow-sm" style="background:#fff8f1;border:1px solid rgba(164,55,0,0.1)">

      <!-- Error banner -->
      <div id="error-banner" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-medium" style="background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.15)"></div>

      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">

        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#594139">Email</label>
          <input
            id="email"
            type="email"
            required
            placeholder="tu@email.com"
            class="w-full rounded-xl px-4 py-3 text-sm outline-none transition-all"
            style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17"
            onfocus="this.style.borderColor='#a43700'"
            onblur="this.style.borderColor='rgba(164,55,0,0.18)'"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold mb-1.5 uppercase tracking-wider" style="color:#594139">Contraseña</label>
          <input
            id="password"
            type="password"
            required
            placeholder="••••••••"
            class="w-full rounded-xl px-4 py-3 text-sm outline-none transition-all"
            style="background:#f4ede5;border:1px solid rgba(164,55,0,0.18);color:#1e1b17"
            onfocus="this.style.borderColor='#a43700'"
            onblur="this.style.borderColor='rgba(164,55,0,0.18)'"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full py-3 rounded-xl text-sm font-bold text-white transition-all active:scale-95 flex items-center justify-center gap-2"
          style="background:#a43700"
        >
          <span id="btn-text">Iniciar sesión</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

      </form>
    </div>

    <!-- Switch to signup -->
    <p class="text-center text-sm mt-4" style="color:#594139">
      ¿No tienes cuenta?
      <a href="/signup.html" class="font-bold ml-1" style="color:#a43700">Regístrate gratis</a>
    </p>

  </div>

  <script>
    const SUPABASE_URL      = 'https://rhyobhcgvrqobouqymqr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeW9iaGNndnJxb2JvdXF5bXFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY0MDQsImV4cCI6MjA5MTk0MjQwNH0.Yc7wiTJ8_66uzqusGTU4dEele5B4C6ZCMlYNMf3w_3U';
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, skip to dashboard
    (async () => {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) window.location.replace('/klaro-dashboard.html');
    })();

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function setLoading(on) {
      document.getElementById('btn-text').textContent = on ? 'Entrando…' : 'Iniciar sesión';
      document.getElementById('btn-spinner').classList.toggle('hidden', !on);
      document.getElementById('submit-btn').disabled = on;
    }

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('error-banner').classList.add('hidden');
      setLoading(true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await _sb.auth.signInWithPassword({ email, password });

      if (error) {
        setLoading(false);
        const msgs = {
          'Invalid login credentials': 'Email o contraseña incorrectos.',
          'Email not confirmed':        'Confirma tu email antes de entrar.',
        };
        showError(msgs[error.message] || error.message);
      } else {
        window.location.replace('/klaro-dashboard.html');
      }
    }
  </script>
</body>
</html>
